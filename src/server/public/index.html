<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Coldwire — on-device private alpha agent</title>
  <style>
    :root {
      --bg:#0b0e14; --panel:#131722; --panel2:#1b2130; --ink:#e6e9ef; --dim:#8b93a7;
      --acc:#36d399; --warn:#fbbd23; --bad:#f87272; --line:#222a3a;
      --mono:ui-monospace,SFMono-Regular,"SF Mono",Menlo,Consolas,monospace;
    }
    * { box-sizing:border-box; }
    body { margin:0; background:var(--bg); color:var(--ink); font:15px/1.5 system-ui,-apple-system,Segoe UI,Roboto,sans-serif; }
    .wrap { max-width:920px; margin:0 auto; padding:28px 18px 80px; }
    h1 { font-size:26px; margin:0 0 2px; letter-spacing:-.5px; }
    .tag { color:var(--acc); font-family:var(--mono); font-size:13px; }
    .sub { color:var(--dim); margin:6px 0 22px; }
    button { background:var(--acc); color:#06281c; border:0; border-radius:8px; padding:11px 18px; font-weight:700; font-size:15px; cursor:pointer; }
    button:disabled { opacity:.5; cursor:not-allowed; }
    .row { display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
    input { background:var(--panel2); border:1px solid var(--line); color:var(--ink); border-radius:8px; padding:10px; font-family:var(--mono); font-size:13px; min-width:180px; }
    .panel { background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:16px 18px; margin-top:18px; }
    .log { font-family:var(--mono); font-size:12.5px; color:var(--dim); white-space:pre-wrap; max-height:170px; overflow:auto; }
    .log b { color:var(--acc); }
    .card { background:var(--panel2); border:1px solid var(--line); border-radius:10px; padding:14px 16px; margin-top:12px; }
    .sig-head { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
    .ticker { font-weight:800; font-size:18px; font-family:var(--mono); }
    .badge { font-size:11px; font-weight:700; padding:3px 9px; border-radius:99px; text-transform:uppercase; letter-spacing:.4px; }
    .b-bullish,.b-accumulate { background:#0f3a2b; color:var(--acc); }
    .b-bearish,.b-reduce,.b-avoid { background:#3a1320; color:var(--bad); }
    .b-neutral { background:#33301a; color:var(--warn); }
    .conv { font-family:var(--mono); color:var(--acc); margin-left:auto; }
    .field { margin-top:7px; }
    .field .k { color:var(--dim); font-size:12px; text-transform:uppercase; letter-spacing:.4px; }
    .src { color:var(--dim); font-size:12px; font-style:italic; margin-top:6px; }
    .proof { font-family:var(--mono); font-size:12.5px; }
    .proof .ok { color:var(--acc); }
    .stat { color:var(--dim); }
    .risks li { margin:2px 0; }
    .err { color:var(--bad); font-family:var(--mono); }
    .muted { color:var(--dim); font-size:13px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Coldwire <span class="tag">// on-device alpha agent</span></h1>
    <p class="sub">Your watchlist, positions and strategy never leave this machine. Inference runs locally via <b>@qvac/sdk</b> — zero cloud, $0 API cost, works offline.</p>

    <div class="row">
      <button id="run">Generate signal report</button>
      <input id="data" value="data/sample" title="private docs directory" />
      <span class="muted" id="host"></span>
    </div>

    <div class="panel">
      <div class="log" id="log">Idle. Click “Generate” to run the on-device pipeline.</div>
    </div>

    <div id="results"></div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const logEl = $("log"), resultsEl = $("results"), runBtn = $("run");

    fetch("/api/health").then(r => r.json()).then(h => {
      $("host").textContent = "host: " + h.host;
    }).catch(() => {});

    function log(msg, strong) {
      const line = strong ? `<b>${msg}</b>` : msg;
      logEl.innerHTML += "\n" + line;
      logEl.scrollTop = logEl.scrollHeight;
    }

    function esc(s) { return String(s).replace(/[&<>]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])); }

    function renderReport(report, proofFile) {
      const p = report.portfolio;
      let html = `<div class="panel"><h2 style="margin:.2em 0">Portfolio</h2>
        <div>${esc(p.portfolioSummary)}</div>`;
      if (p.keyRisks && p.keyRisks.length) {
        html += `<ul class="risks">` + p.keyRisks.map(r => `<li>${esc(r)}</li>`).join("") + `</ul>`;
      }
      html += `</div>`;

      html += `<div class="panel"><h2 style="margin:.2em 0">Signals <span class="muted">(${report.assetCount} assets)</span></h2>`;
      for (const s of report.signals) {
        const bar = "█".repeat(s.conviction) + "░".repeat(5 - s.conviction);
        html += `<div class="card">
          <div class="sig-head">
            <span class="ticker">${esc(s.asset)}</span>
            <span class="badge b-${esc(s.stance)}">${esc(s.stance)}</span>
            <span class="conv">conviction ${bar} ${s.conviction}/5</span>
          </div>
          <div class="field"><span class="k">thesis</span><div>${esc(s.thesis)}</div></div>
          <div class="field"><span class="k">risk</span><div>${esc(s.risk)}</div></div>
          <div class="field"><span class="k">action</span><div>${esc(s.suggestedAction)}</div></div>
          ${s.sources && s.sources.length ? `<div class="src">grounded on ${s.sources.length} retrieved private note(s): “${esc(s.sources[0])}…”</div>` : ""}
        </div>`;
      }
      html += `</div>`;

      const pr = report.proof;
      html += `<div class="panel proof"><h2 style="margin:.2em 0">On-device proof <span class="ok">✓ ${esc(pr.host)}</span></h2>
        <div class="stat">llm: ${esc(report.llmModel)} · embeddings: ${esc(report.embedModel)}</div>
        <div style="margin-top:8px">`;
      for (const st of pr.stats) {
        const tps = st.tokensPerSecond != null ? st.tokensPerSecond.toFixed(1) + " tok/s" : "n/a";
        html += `<div class="stat">• ${esc(st.label)} — device=<span class="ok">${esc(st.backendDevice || "?")}</span> ${tps} ${st.generatedTokens != null ? "· " + st.generatedTokens + " gen" : ""}</div>`;
      }
      html += `</div>`;
      if (proofFile) html += `<div class="stat" style="margin-top:8px">proof artifact: ${esc(proofFile)}</div>`;
      html += `<pre class="stat" style="white-space:pre-wrap;margin-top:8px">${esc(pr.profilerSummary)}</pre></div>`;

      resultsEl.innerHTML = html;
    }

    runBtn.addEventListener("click", () => {
      resultsEl.innerHTML = "";
      logEl.textContent = "";
      runBtn.disabled = true;
      log("connecting to on-device pipeline…", true);
      const data = encodeURIComponent($("data").value || "data/sample");
      const es = new EventSource(`/api/report?data=${data}`);

      es.addEventListener("phase", (e) => log("▸ " + JSON.parse(e.data).phase, true));
      es.addEventListener("asset", (e) => { const d = JSON.parse(e.data); log(`   • reasoning ${d.ticker} (${d.index}/${d.total})`); });
      es.addEventListener("download", (e) => { const d = JSON.parse(e.data); log(`   ↓ downloading ${d.label} ${d.percentage}%`); });
      es.addEventListener("report", (e) => {
        const d = JSON.parse(e.data);
        log("✓ report ready", true);
        renderReport(d.report, d.proofFile);
        es.close(); runBtn.disabled = false;
      });
      es.addEventListener("error", (e) => {
        if (e.data) { try { log("error: " + JSON.parse(e.data).message); } catch {} }
        es.close(); runBtn.disabled = false;
      });
    });
  </script>
</body>
</html>
